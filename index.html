<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michael Ochoa // Cybersecurity Analyst</title>
<style>
  :root {
    --bg: #000000;
    --panel: #050806;
    --green: #3ddc63;
    --green-dim: #276b39;
    --green-glow: rgba(61,220,99,0.35);
    --blue: #5ec8f0;
    --white: #e8ece9;
    --grey: #7c8a82;
    --line: #17251b;
    --amber: #e8b339;
    --red: #e0745a;
    --purple1: #6d28d9;
    --purple2: #a855f7;
    --mono: 'IBM Plex Mono', 'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--white);
    font-family: var(--mono);
  }

  body { display: flex; flex-direction: column; min-height: 100vh; }

  /* ---------- ticker ---------- */
  .ticker-wrap {
    border-bottom: 1px solid var(--line);
    background: #030503;
    overflow: hidden;
    white-space: nowrap;
    padding: 6px 0;
    font-size: 0.68rem;
    color: var(--green-dim);
  }

  .ticker-track {
    display: inline-block;
    padding-left: 100%;
    animation: ticker 38s linear infinite;
  }

  .ticker-track span { margin-right: 46px; }
  .ticker-track .amber { color: var(--amber); }
  .ticker-track .dim { color: var(--grey); }

  @keyframes ticker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
  }

  .layout {
    flex: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ---------- left panel ---------- */
  .person-panel {
    position: relative;
    border-right: 1px solid var(--line);
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .grid-texture {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(61,220,99,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,220,99,0.05) 1px, transparent 1px);
    background-size: 26px 26px;
    -webkit-mask-image: radial-gradient(ellipse at 50% 20%, black 0%, transparent 70%);
    mask-image: radial-gradient(ellipse at 50% 20%, black 0%, transparent 70%);
    pointer-events: none;
  }

  .person-panel > * { position: relative; z-index: 1; }

  .person-panel .name {
    color: var(--green);
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: 0.02em;
    text-shadow: 0 0 10px var(--green-glow);
  }

  .person-panel .role {
    color: var(--grey);
    font-size: 0.82rem;
    margin-top: 2px;
  }

  .card-wrap {
    margin-top: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    perspective: 900px;
  }

  .lanyard {
    width: 2px;
    height: 40px;
    background: linear-gradient(var(--line), var(--green-dim));
  }

  .clip {
    width: 14px;
    height: 14px;
    border: 2px solid var(--green-dim);
    border-radius: 50%;
    margin-bottom: -2px;
    background: var(--bg);
  }

  #card {
    width: 190px;
    background: #0a0f0a;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .card-badge {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--green);
    margin-bottom: 10px;
  }

  .card-badge .id-tag { color: var(--green-dim); }
  .card-badge svg { flex-shrink: 0; }
  .card-badge .left { display: flex; align-items: center; gap: 6px; }

  .avatar {
    width: 100%;
    aspect-ratio: 1 / 1.15;
    border-radius: 6px;
    background:
      radial-gradient(circle at 50% 35%, #2c332f 0%, #0d100e 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green-dim);
    font-size: 2.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    filter: grayscale(1);
  }

  .card-caption {
    text-align: center;
    color: var(--grey);
    font-size: 0.64rem;
    margin-top: 10px;
    opacity: 0.75;
  }

  /* status readout */
  .status-readout {
    margin-top: 26px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 0.68rem;
  }

  .status-readout .row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    color: var(--grey);
  }

  .status-readout .row span:last-child { color: var(--green); }
  .status-readout .row.live span:last-child { color: var(--blue); }

  .status-readout .dot-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 4px;
    margin-top: 4px;
    border-top: 1px solid var(--line);
    color: var(--green);
  }

  .status-readout .dot-row::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green-glow);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  .panel-links {
    margin-top: auto;
    padding-top: 30px;
    font-size: 0.75rem;
    line-height: 2;
  }

  .panel-links a {
    color: var(--blue);
    text-decoration: none;
  }
  .panel-links a:hover, .panel-links a:focus-visible { color: var(--green); text-decoration: underline; }

  /* ---------- right panel ---------- */
  .terminal-panel {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  nav.commands {
    padding: 16px 22px;
    border-bottom: 1px solid var(--line);
    font-size: 0.78rem;
    color: var(--green);
    line-height: 1.8;
  }

  nav.commands button {
    background: none;
    border: none;
    color: var(--green);
    font-family: var(--mono);
    font-size: 0.78rem;
    cursor: pointer;
    padding: 0;
  }
  nav.commands button:hover, nav.commands button:focus-visible { color: var(--blue); outline: none; }
  nav.commands .sep { color: var(--line); margin: 0 8px; }

  .terminal-body {
    flex: 1;
    padding: 18px 22px;
    font-size: 0.9rem;
    line-height: 1.55;
    overflow-y: auto;
    min-height: 380px;
  }

  .terminal-body::-webkit-scrollbar { width: 8px; }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .line { white-space: pre-wrap; word-break: break-word; margin: 0 0 4px; }
  .prompt-line { color: var(--blue); }
  .prompt-line .cmd { color: var(--white); }
  .out { color: var(--white); }
  .out .accent { color: var(--green); }
  .out .heading { color: var(--green); font-weight: 700; }
  .out a { color: var(--blue); text-decoration: underline; text-underline-offset: 3px; }
  .out a:hover, .out a:focus-visible { color: var(--green); }
  .out .tag { color: var(--red); }
  .boot { color: var(--green-dim); font-size: 0.84rem; }
  .hint { color: var(--grey); font-size: 0.72rem; }

  .live-prompt {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--blue);
  }
  .live-prompt input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: var(--mono);
    font-size: 0.9rem;
    caret-color: var(--green);
  }
  .live-prompt input:focus-visible { outline: none; }

  .cursor-block {
    display: inline-block;
    width: 8px;
    height: 15px;
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .status-bar {
    display: flex;
    justify-content: space-between;
    padding: 8px 22px;
    border-top: 1px solid var(--line);
    font-size: 0.68rem;
    color: var(--green-dim);
  }

  .accent-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--purple1), var(--purple2), var(--purple1));
    background-size: 200% 100%;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% 0; } }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    .ticker-track { animation: none; padding-left: 0; }
  }

  @media (max-width: 800px) {
    .card-wrap { margin-top: 24px; }
    nav.commands { font-size: 0.72rem; }
    .ticker-wrap { display: none; }
  }
</style>
</head>

      <div class="row live"><span>clearance</span><span>analyst</span></div>
      <div class="dot-row">status: secure</div>
    </div>

    <div class="panel-links">
      <div>&gt; <a href="https://www.linkedin.com/in/michaelochoaa/" target="_blank" rel="noopener">linkedin</a></div>
      <div>&gt; <a href="https://github.com/michaelochoaa" target="_blank" rel="noopener">github</a></div>
      <div>&gt; <a href="mailto:michaelochoa@berkeley.edu">email</a></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="terminal-panel">
    <nav class="commands" aria-label="Quick navigation">
      <button data-cmd="help">help</button><span class="sep">|</span><button data-cmd="about">about</button><span class="sep">|</span><button data-cmd="projects">projects</button><span class="sep">|</span><button data-cmd="skills">skills</button><span class="sep">|</span><button data-cmd="experience">experience</button><span class="sep">|</span><button data-cmd="contact">contact</button><span class="sep">|</span><button data-cmd="education">education</button><span class="sep">|</span><button data-cmd="certifications">certifications</button><span class="sep">|</span><button data-cmd="leadership">leadership</button><span class="sep">|</span><button data-cmd="scan">scan</button><span class="sep">|</span><button data-cmd="sudo">sudo</button><span class="sep">|</span><button data-cmd="clear">clear</button>
    </nav>

    <div class="terminal-body" id="terminalBody" role="log" aria-live="polite"></div>

    <div class="live-prompt" style="padding: 0 22px 14px;">
      <span>ochoa@portfolio:~$</span>
      <input id="cmdInput" type="text" autocomplete="off" spellcheck="false" aria-label="Terminal command input">
      <span class="cursor-block" aria-hidden="true"></span>
    </div>

    <div class="status-bar">
      <span>↑↓ history · tab complete · ctrl+L clear</span>
      <span id="clock"></span>
    </div>
  </div>

</div>

<div class="accent-bar"></div>

<script>
(function () {
  const body = document.getElementById('terminalBody');
  const input = document.getElementById('cmdInput');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function appendRaw(html, cls) {
    const div = document.createElement('div');
    div.className = 'line ' + (cls || '');
    div.innerHTML = html;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    return div;
  }

  function appendPrompt(cmd) {
    appendRaw('<span class="prompt-line">ochoa@portfolio:~$ <span class="cmd">' + cmd + '</span></span>');
  }

  const commands = {
    help: () => `
<span class="out heading">available commands</span>
<span class="out">  about            who I am</span>
<span class="out">  experience       where I've worked and what I've built</span>
<span class="out">  projects         things I've shipped</span>
<span class="out">  skills           stack and tools</span>
<span class="out">  certifications   in-progress and planned</span>
<span class="out">  education        degrees, current and completed</span>
<span class="out">  leadership       how I'm building that side deliberately</span>
<span class="out">  contact          how to reach me</span>
<span class="out">  scan             run a harmless scan of this session</span>
<span class="out">  history          show commands you've typed</span>
<span class="out">  clear            clear the screen</span>
<span class="hint">tip: tab-complete works, and arrow keys cycle your command history</span>`,

    about: () => `
<span class="out heading">about</span>
<span class="out">Cybersecurity Analyst at Triple Point Security, working inside a Microsoft 365 GCC High
environment that serves DoD contractors under CMMC and NIST SP 800-171. Most of my work sits
at the intersection of Microsoft security tooling, compliance mapping, and security automation.
I build things that reduce manual analyst work: automated phishing intelligence pipelines,
control-to-capability mappings, internal reporting tools.

Starting UC Berkeley's Master of Information and Cybersecurity (MICS) in Fall 2026, while
studying for Security+ and AZ-104 in parallel. Long term, I'm building toward cloud security,
Microsoft security engineering, and AI-assisted compliance tooling.</span>`,

    experience: () => `
<span class="out heading">experience</span>
<span class="out accent">Triple Point Security — Cybersecurity Analyst, Internal IT</span>
<span class="out">  - Built and maintain a phishing intelligence pipeline (Azure Logic Apps + Microsoft Graph
    API + Defender for Office 365) that automates daily threat reporting
  - Mapped Microsoft Defender for Endpoint capabilities against 110 NIST SP 800-171 controls
    across 18 CMMC Level 1 practices
  - Authored internal SOPs and monthly technology update reports for a GCC High, CMMC-scoped
    environment
  - Working across Defender XDR, MDE, MDA, MDI, Intune, and Entra ID</span>`,

    projects: () => `
<span class="out heading">projects</span>
<span class="out accent">Phishing Intelligence Pipeline</span>
<span class="out">  Azure Logic Apps + Microsoft Graph API + Defender for Office 365. Automates daily phishing
  detection reporting; v2.0 in progress to close remaining manual analyst steps.</span>

<span class="out accent">CMMC / NIST 800-171 Control Mapping for MDE</span>
<span class="out">  Five-tab workbook mapping Microsoft Defender for Endpoint capabilities to 110 NIST SP
  800-171 Rev. 2 controls across 18 CMMC Level 1 practices.</span>

<span class="out accent">CMMC Copilot <span class="tag">[in validation]</span></span>
<span class="out">  AI-assisted CMMC compliance tool concept for small and mid-size federal contractors.
  Currently running customer discovery conversations.</span>

<span class="out">  more on <a href="https://github.com/michaelochoaa" target="_blank" rel="noopener">GitHub</a> — code, not just writeups.</span>`,

    skills: () => `
<span class="out heading">skills</span>
<span class="out accent">Microsoft Security</span><span class="out">   Defender XDR, MDE, MDA, MDI, Defender for Office 365, Entra ID, Intune</span>
<span class="out accent">Automation</span><span class="out">          Azure Logic Apps, Microsoft Graph API</span>
<span class="out accent">Compliance</span><span class="out">          CMMC (L1/L2), NIST SP 800-171, GCC High</span>
<span class="out accent">Building</span><span class="out">            Python, cloud scripting</span>`,

    certifications: () => `
<span class="out heading">certifications</span>
<span class="out">  CompTIA Security+ (SY0-701)   <span class="tag">in progress</span></span>
<span class="out">  AZ-104, Azure Administrator   <span class="tag">in progress</span></span>`,

    education: () => `
<span class="out heading">education</span>
<span class="out accent">UC Berkeley</span><span class="out">   Master of Information and Cybersecurity (MICS) — starts Fall 2026</span>
<span class="out accent">Virginia Tech</span><span class="out">  B.S. Business Information Technology, Cybersecurity Management
                  and Analytics concentration</span>`,

    leadership: () => `
<span class="out heading">leadership</span>
<span class="out">Treating leadership as a deliberate track alongside technical skill: taking ownership of
recurring deliverables end to end, mentoring where I can, and building the communication habits
that scale past individual contributor work.</span>`,

    contact: () => `
<span class="out heading">contact</span>
<span class="out">  LinkedIn   <a href="https://www.linkedin.com/in/michaelochoaa/" target="_blank" rel="noopener">linkedin.com/in/michaelochoaa</a></span>
<span class="out">  GitHub     <a href="https://github.com/michaelochoaa" target="_blank" rel="noopener">github.com/michaelochoaa</a></span>
<span class="out">  Email      <a href="mailto:michaelochoa@berkeley.edu">michaelochoa@berkeley.edu</a></span>`,

    scan: () => {
      const w = window.screen.width, h = window.screen.height;
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const ua = navigator.userAgent.includes('Chrome') ? 'Chrome-based' :
                 navigator.userAgent.includes('Firefox') ? 'Firefox' :
                 navigator.userAgent.includes('Safari') ? 'Safari' : 'unknown browser';
      return `
<span class="out heading">scan: local session only, nothing leaves this browser</span>
<span class="out">  viewport ......... ${w} x ${h}</span>
<span class="out">  timezone ......... ${tz}</span>
<span class="out">  client ........... ${ua}</span>
<span class="out">  threats detected .. <span class="accent">0</span></span>
<span class="out">  verdict .......... you're clean. for now.</span>`;
    },

    history: () => {
      if (!cmdHistory.length) return `<span class="out">no commands typed yet.</span>`;
      return '<span class="out heading">history</span>\n' + cmdHistory.map((c,i) => `<span class="out">  ${i+1}  ${c}</span>`).join('\n');
    },

    sudo: () => `<span class="out tag">permission denied: nice try though.</span>`,

    whoami: () => `<span class="out">ochoa — cybersecurity analyst, builder, incoming MICS student.</span>`,

    clear: () => { body.innerHTML = ''; return null; }
  };

  const cmdHistory = [];
  let historyPointer = -1;

  function run(cmdRaw, silent) {
    const cmd = cmdRaw.trim().toLowerCase();
    if (!silent) appendPrompt(cmdRaw);
    if (cmd === '') return;
    if (!silent) { cmdHistory.push(cmdRaw); historyPointer = cmdHistory.length; }
    if (commands[cmd]) {
      const out = commands[cmd]();
      if (out) appendRaw(out, 'out-block');
    } else {
      appendRaw(`<span class="out">command not found: <span class="tag">${escapeHtml(cmd)}</span>. type 'help' for a list.</span>`);
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  const cmdNames = Object.keys(commands);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = input.value;
      input.value = '';
      run(val);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyPointer > 0) { historyPointer--; input.value = cmdHistory[historyPointer] || ''; }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyPointer < cmdHistory.length - 1) { historyPointer++; input.value = cmdHistory[historyPointer] || ''; }
      else { historyPointer = cmdHistory.length; input.value = ''; }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const partial = input.value.trim().toLowerCase();
      if (partial) {
        const match = cmdNames.find(c => c.startsWith(partial));
        if (match) input.value = match;
      }
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      run('clear');
    }
  });

  document.querySelectorAll('nav.commands button').forEach(btn => {
    btn.addEventListener('click', () => {
      run(btn.dataset.cmd);
      input.focus();
    });
  });

  const bootLines = [
    'initializing session...',
    'verifying identity...',
    'environment: GCC High (simulated for portfolio purposes)',
    'compliance check: CMMC / NIST SP 800-171 ... clear',
    'loading profile: ochoa, michael ...',
    'access granted.'
  ];

  function boot() {
    if (reduceMotion) {
      bootLines.forEach(l => appendRaw('<span class="boot">' + l + '</span>'));
      afterBoot();
      return;
    }
    let i = 0;
    const interval = setInterval(() => {
      appendRaw('<span class="boot">' + bootLines[i] + '</span>');
      i++;
      if (i >= bootLines.length) {
        clearInterval(interval);
        setTimeout(afterBoot, 300);
      }
    }, 240);
  }

  function afterBoot() {
    appendRaw('<span class="out">Welcome. Type <span class="accent">help</span> to see available commands, or use the bar above.</span>');
    run('about', true);
    input.focus();
  }

  boot();

  // live clock
  const clockEl = document.getElementById('clock');
  function tick() {
    clockEl.textContent = new Date().toLocaleString();
  }
  tick();
  setInterval(tick, 1000);

  // session uptime
  const startTime = Date.now();
  const uptimeEl = document.getElementById('uptime');
  function tickUptime() {
    const secs = Math.floor((Date.now() - startTime) / 1000);
    const h = String(Math.floor(secs / 3600)).padStart(2, '0');
    const m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
    const s = String(secs % 60).padStart(2, '0');
    uptimeEl.textContent = `${h}:${m}:${s}`;
  }
  tickUptime();
  setInterval(tickUptime, 1000);

  // ticker content
  const tickerItems = [
    '<span class="amber">PATCH TUESDAY</span> reviewed',
    'defender: <span class="amber">0</span> active threats',
    'nist sp 800-171: <span class="amber">110/110</span> controls mapped',
    'phishing pipeline: <span class="amber">v2.0</span> in progress',
    '<span class="dim">env:</span> gcc high, cmmc-scoped',
    'session encrypted',
    'status: <span class="amber">secure</span>'
  ];
  const track = document.getElementById('tickerTrack');
  const doubled = tickerItems.concat(tickerItems);
  track.innerHTML = doubled.map(t => `<span>${t}</span>`).join('');

  // 3D tilt card
  if (!reduceMotion) {
    const card = document.getElementById('card');
    const wrap = document.querySelector('.card-wrap');
    wrap.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      card.style.transform = `rotateY(${x * 16}deg) rotateX(${-y * 16}deg)`;
    });
    wrap.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateY(0deg) rotateX(0deg)';
    });
  }
})();
</script>

</body>
</html>
